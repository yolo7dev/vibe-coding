# Deploy by pulling the latest source on the VPS, building there, and reloading PM2.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST         — server hostname or IP
#   VPS_USER         — SSH user (e.g. deploy)
#   VPS_SSH_KEY      — private key contents (PEM, no passphrase, matching authorized_keys on the VPS)
#   VPS_PORT         — SSH port (optional, defaults to 22)
#   VPS_APP_PATH     — absolute path where the repo lives on the VPS, e.g. /home/deploy/vibe-coding
#   PM2_APP_NAME     — PM2 process name (optional, defaults to "vibe-coding")
#   PM2_PORT         — port PM2 binds to (optional, defaults to 3000)
#
# One-time VPS prep:
#   - Install Node 22+, then: `npm i -g pm2 serve`
#   - Run `pm2 startup` once and execute the printed sudo command so PM2 auto-starts on boot.
#   - For a PRIVATE repo: add an SSH deploy key on the VPS (~/.ssh/id_ed25519) and register the
#     public key on GitHub → Repo Settings → Deploy keys; the clone URL below uses HTTPS for
#     public repos. For private, switch REPO_URL to git@github.com:<owner>/<repo>.git.

name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:


concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Deploy over SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT || 22 }}
        script: |
          set -euo pipefail
          export PATH="$HOME/.npm-global/bin:/usr/local/bin:$PATH"

          APP_PATH="${{ secrets.VPS_APP_PATH }}"
          APP_NAME="${{ secrets.PM2_APP_NAME || 'vibe-coding' }}"
          PORT="${{ secrets.PM2_PORT || '3000' }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          BRANCH="${{ github.ref_name }}"

          # Clone on first deploy, otherwise hard-reset to the latest commit on the branch.
          if [ ! -d "$APP_PATH/.git" ]; then
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_PATH"
          fi
          cd "$APP_PATH"
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          npm ci
          npm run build

          # First deploy bootstraps the PM2 process; subsequent deploys reload it.
          if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
            pm2 reload "$APP_NAME" --update-env
          else
            pm2 serve dist "$PORT" --spa --name "$APP_NAME"
          fi
          pm2 save
